name: CI

on:
  # Run CI for changes merged into main and for PRs targeting main.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Keep service repos thin by delegating the real logic to apple-workflows.
    uses: RobbyPrograms/apple-workflows/.github/workflows/go-ci.yml@main
    with:
      service-name: svc-reporting
